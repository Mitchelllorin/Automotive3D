name: Deploy marketing site

# Publishes the public marketing website to automotive3d.ca (GitHub Pages).
# The site is static — landing, privacy, and data safety pages only.
# The app itself ships through the Play / Apple stores.

on:
  push:
    branches: [main]
    paths:
      - 'public/landing.html'
      - 'public/privacy.html'
      - 'public/datasafety.html'
      - 'public/favicon.svg'
      - 'public/CNAME'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static marketing site
        run: |
          mkdir -p _site
          cp public/landing.html     _site/index.html
          cp public/landing.html     _site/landing.html
          cp public/privacy.html     _site/privacy.html
          cp public/datasafety.html  _site/datasafety.html
          cp public/favicon.svg      _site/favicon.svg
          cp public/CNAME            _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
